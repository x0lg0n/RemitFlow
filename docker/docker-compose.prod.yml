services:
  # ── Backend API ──────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: production
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY_HOURS=${JWT_EXPIRY_HOURS:-24}
      - SESSION_COOKIE_NAME=${SESSION_COOKIE_NAME:-remitflow_session}
      - STELLAR_NETWORK=${STELLAR_NETWORK:-mainnet}
      - STELLAR_RPC_URL=${STELLAR_RPC_URL}
      - STELLAR_HORIZON_URL=${STELLAR_HORIZON_URL}
      - SOROBAN_CONTRACT_ADDRESS=${SOROBAN_CONTRACT_ADDRESS}
      - SEP10_HOME_DOMAIN=${SEP10_HOME_DOMAIN}
      - SEP10_WEB_AUTH_DOMAIN=${SEP10_WEB_AUTH_DOMAIN}
      - SEP10_SERVER_SECRET=${SEP10_SERVER_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Rate Oracle ──────────────────────────────────────────────────
  oracle:
    build:
      context: ../oracle
      dockerfile: Dockerfile
      target: production
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - ORACLE_USE_RATE_CALLBACK_ONLY=${ORACLE_USE_RATE_CALLBACK_ONLY:-true}
      - SOROBAN_RPC_URL=${STELLAR_RPC_URL}
      - SOROBAN_NETWORK_PASSPHRASE=${STELLAR_NETWORK_PASSPHRASE}
      - SOROBAN_CONTRACT_ADDRESS=${SOROBAN_CONTRACT_ADDRESS}
      - ORACLE_SECRET_KEY=${ORACLE_SECRET_KEY}
      - ANCHOR_CONFIGS=${ANCHOR_CONFIGS}
      - POLL_INTERVAL_MINUTES=${POLL_INTERVAL_MINUTES:-5}
      - MAX_DEVIATION_PERCENT=${MAX_DEVIATION_PERCENT:-5}
      - MAX_CONSECUTIVE_FAILURES=${MAX_CONSECUTIVE_FAILURES:-3}
    depends_on:
      backend:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── PostgreSQL ───────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-remitflow}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redis ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

# ── Production Networks ────────────────────────────────────────────
networks:
  default:
    driver: bridge
    name: remitflow-network
