services:
  # ── Backend API ──────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/remiflow
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev-secret-change-me
      - JWT_EXPIRY_HOURS=24
      - SESSION_COOKIE_NAME=remitflow_session
      - STELLAR_NETWORK=testnet
      - STELLAR_RPC_URL=https://soroban-testnet.stellar.org
      - STELLAR_HORIZON_URL=https://horizon-testnet.stellar.org
      - SOROBAN_CONTRACT_ADDRESS=CAN4U3NRPWV7IPDUSKWAYMTHWNSFH4ZRJGA7KMEDKLYJCJCCJNV6TXF7
      - SEP10_HOME_DOMAIN=localhost
      - SEP10_WEB_AUTH_DOMAIN=localhost
      - SEP10_SERVER_SECRET=SAC2T4LY4EOY35VZDBNBORDDLXA56S5FERIBTXXPTES2VJH5QFK2DODN
      - CORS_ORIGINS=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Rate Oracle ──────────────────────────────────────────────────
  oracle:
    build:
      context: ../oracle
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/remiflow
      - REDIS_URL=redis://redis:6379
      - ORACLE_USE_RATE_CALLBACK_ONLY=true
      - SOROBAN_RPC_URL=https://soroban-testnet.stellar.org
      - SOROBAN_NETWORK_PASSPHRASE=Test SDF Network ; September 2015
      - SOROBAN_CONTRACT_ADDRESS=CAN4U3NRPWV7IPDUSKWAYMTHWNSFH4ZRJGA7KMEDKLYJCJCCJNV6TXF7
      - ORACLE_SECRET_KEY=412b18e689dc5f11fc8ca91a179a18e25ac0fa430cd5656074127df914bbad65
      - ANCHOR_CONFIGS=test_anchor_colombia|https://api.example.com|test-token-123 
      - POLL_INTERVAL_MINUTES=5
      - MAX_DEVIATION_PERCENT=5
      - MAX_CONSECUTIVE_FAILURES=3
    depends_on:
      backend:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=remiflow
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Redis ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes

volumes:
  pgdata:
  redisdata:
