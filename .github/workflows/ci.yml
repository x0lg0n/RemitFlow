name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '10'
  RUST_VERSION: '1.85.0'

jobs:
  # ─── Lint & Type Check ─────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
            ${{ github.workspace }}/**/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install backend dependencies
        run: cd backend && pnpm install --frozen-lockfile

      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Install oracle dependencies
        run: cd oracle && pnpm install --frozen-lockfile

      - name: Lint backend
        run: cd backend && pnpm lint

      - name: Lint frontend
        run: cd frontend && pnpm lint

      - name: Lint oracle
        run: cd oracle && pnpm lint

      - name: Type check backend
        run: cd backend && pnpm type-check || pnpm tsc --noEmit

      - name: Type check frontend
        run: cd frontend && pnpm type-check || pnpm tsc --noEmit

      - name: Type check oracle
        run: cd oracle && pnpm type-check || pnpm tsc --noEmit

  # ─── Backend Tests ─────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: remitflow_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: cd backend && pnpm install --frozen-lockfile

      - name: Run database migrations
        run: cd backend && pnpm migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/remitflow_test

      - name: Run backend tests
        run: cd backend && pnpm exec jest --config jest.config.ts --coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/remitflow_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key-for-ci
          NODE_ENV: test

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
        if: always()

  # ─── Frontend Tests ────────────────────────────────────────────────────
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: cd frontend && pnpm test

      - name: Build frontend
        run: cd frontend && pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_PUBLIC_STELLAR_NETWORK: testnet

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
        if: always()

  # ─── Oracle Tests ──────────────────────────────────────────────────────
  test-oracle:
    name: Oracle Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: remitflow_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: cd oracle && pnpm install --frozen-lockfile

      - name: Run oracle tests
        run: cd oracle && pnpm exec jest --passWithNoTests --coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/remitflow_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      - name: Upload oracle coverage
        uses: actions/upload-artifact@v4
        with:
          name: oracle-coverage
          path: oracle/coverage/
        if: always()

  # ─── Smart Contract Tests ──────────────────────────────────────────────
  test-contracts:
    name: Smart Contract Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          target: wasm32-unknown-unknown
          override: true
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            smart-contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('smart-contracts/**/Cargo.lock') }}

      - name: Install Soroban CLI
        run: cargo install --locked soroban-cli --version 21.0.0

      - name: Run clippy
        run: |
          cd smart-contracts/contracts/remitflow
          cargo clippy -- -D warnings

      - name: Run smart contract tests
        run: |
          cd smart-contracts
          cargo test --release

      - name: Build contract
        run: |
          cd smart-contracts/contracts/remitflow
          cargo build --target wasm32-unknown-unknown --release

  # ─── Docker Build Test ─────────────────────────────────────────────────
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [lint, test-backend, test-frontend, test-oracle, test-contracts]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test backend Docker build
        run: docker build -t remitflow-backend ./backend

      - name: Test frontend Docker build
        run: docker build -t remitflow-frontend ./frontend

      - name: Test oracle Docker build
        run: docker build -t remitflow-oracle ./oracle

      - name: Test Docker Compose
        run: |
          cd docker
          cp .env.example .env
          docker compose config
